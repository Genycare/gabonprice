<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GabonPrice - Le prix juste, partout au Gabon</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --green:#157347; --green-bright:#16A34A; --green-soft:#ECFDF5; --ink:#111827; --muted:#6B7280; --line:#E5E7EB; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#d8d8d8;
        min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:20px; }
    .mockup-container {
        position:relative; width:100%; max-width:600px; aspect-ratio:1086/1449;
        background:url('login-bg.jpg') center/cover no-repeat;
        border-radius:24px; overflow:hidden; box-shadow:0 25px 70px rgba(0,0,0,0.3);
    }
    /* CARD e-mail fonctionnelle, posée exactement sur la card de l'image */
    .email-card {
        position:absolute; top:47.2%; left:13.1%; width:73.8%; height:30.8%;
        background:#fff; border-radius:5% / 3.5%;
        box-shadow:0 10px 40px rgba(0,0,0,0.12);
        padding:3.4% 4%; display:flex; flex-direction:column; justify-content:center; z-index:10;
    }
    .card-header { display:flex; align-items:center; gap:3.5%; margin-bottom:4%; }
    .card-icon-box { width:11%; aspect-ratio:1; background:var(--green-soft); border-radius:22%;
        display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .card-icon-box svg { width:52%; height:52%; stroke:var(--green-bright); fill:none; stroke-width:2; }
    .card-title { font-size:clamp(14px,3.2vw,20px); font-weight:800; color:var(--ink); margin-bottom:2px; }
    .card-subtitle { font-size:clamp(11px,2.3vw,14px); color:var(--muted); line-height:1.3; }
    .input-group { display:flex; align-items:center; gap:3%; margin-bottom:3.5%;
        background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:2.6% 3.5%; }
    .input-group svg { width:clamp(16px,3.6vw,22px); height:clamp(16px,3.6vw,22px); stroke:var(--muted); fill:none; stroke-width:2; flex-shrink:0; }
    .email-input { flex:1; border:none; background:transparent; font-size:clamp(13px,3vw,17px); color:var(--ink); min-width:0; }
    .email-input:focus { outline:none; }
    .email-input::placeholder { color:#9CA3AF; }
    .submit-btn { width:100%; padding:3.6%; background:var(--green); color:#fff; border:none; border-radius:14px;
        font-size:clamp(14px,3.3vw,19px); font-weight:800; cursor:pointer; transition:all 0.2s; }
    .submit-btn:hover { background:#0f5c38; }
    /* Correction du 3e slogan : recouvre "Achats sécurisés" (fond blanc de l'image) */
    .feature-fix {
        position:absolute; top:82%; left:67.6%; width:31%; height:10.5%;
        background:#fff; display:flex; flex-direction:column; gap:3px; z-index:8;
    }
    .ff-head { display:flex; align-items:flex-start; gap:5px; }
    .ff-head svg { width:clamp(12px,2.4vw,17px); height:clamp(12px,2.4vw,17px); color:var(--green-bright); flex-shrink:0; margin-top:1px; }
    .ff-title { font-size:clamp(8.5px,1.75vw,12.5px); font-weight:800; color:var(--ink); line-height:1.15; }
    .ff-sub { font-size:clamp(8px,1.6vw,11.5px); color:var(--muted); line-height:1.25; }
    @media (max-width:600px){ body{padding:0;background:#fff;} .mockup-container{border-radius:0;box-shadow:none;max-width:100%;} }
</style>
</head>
<body>
<div class="mockup-container">
    <!-- Card e-mail fonctionnelle -->
    <div class="email-card">
        <div class="card-header">
            <div class="card-icon-box">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-10 5L2 7"></path></svg>
            </div>
            <div>
                <div class="card-title">Entrez votre email</div>
                <div class="card-subtitle">Nous vous enverrons un code pour continuer</div>
            </div>
        </div>
        <div class="input-group">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-10 5L2 7"></path></svg>
            <input type="email" class="email-input" placeholder="exemple@email.com" autocomplete="email">
        </div>
        <button class="submit-btn">Recevoir le code</button>
    </div>

    <!-- Correction 3e slogan : "Économisez au quotidien" recouvre "Achats sécurisés" -->
    <div class="feature-fix">
        <div class="ff-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            <div class="ff-title">Économisez au quotidien</div>
        </div>
        <div class="ff-sub">Trouvez le meilleur prix avant d'acheter.</div>
    </div>
</div>
<script>
    const btn=document.querySelector('.submit-btn'), input=document.querySelector('.email-input');
    btn.addEventListener('click',()=>{const re=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if(re.test(input.value.trim()))alert('Code envoyé à '+input.value.trim()); else alert('Veuillez entrer une adresse e-mail valide');});
    input.addEventListener('keypress',e=>{if(e.key==='Enter')btn.click();});
</script>
</body>
</html>
