<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GabonPrice - Vérification du code</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --green:#157347; --green-bright:#16A34A; --green-soft:#ECFDF5; --blue:#1E3A8A;
        --gold:#FCD34D; --ink:#111827; --muted:#6B7280; --line:#E5E7EB; --bg:#F4F6F5; --card:#FFFFFF; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#d8d8d8;
        min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:20px; }
    .mockup-container { width:100%; max-width:560px; background:#fff; border-radius:28px; overflow:hidden;
        position:relative; box-shadow:0 25px 70px rgba(0,0,0,0.3); }
    .hero { width:100%; aspect-ratio:1086/478; background:url('otp-hero.jpg') center/cover no-repeat; }
    .form-card { position:relative; margin:-70px 26px 0; background:#fff; border-radius:24px; padding:32px;
        box-shadow:0 18px 50px rgba(0,0,0,0.2); z-index:20; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--green-bright); font-size:14px;
        font-weight:700; margin-bottom:18px; cursor:pointer; background:none; border:none; }
    .card-title { font-size:22px; font-weight:800; color:var(--ink); margin-bottom:8px; }
    .card-subtitle { font-size:15px; color:var(--muted); line-height:1.5; margin-bottom:26px; }
    .card-subtitle b { color:var(--ink); }
    .code-inputs { display:flex; gap:10px; justify-content:space-between; margin-bottom:26px; }
    .code-box { flex:1; aspect-ratio:1; max-width:64px; text-align:center; font-size:26px; font-weight:700;
        color:var(--ink); border:2px solid var(--line); border-radius:14px; background:var(--bg); transition:all 0.2s; }
    .code-box:focus { outline:none; border-color:var(--green-bright); background:#fff; box-shadow:0 0 0 4px rgba(22,163,74,0.12); }
    .code-box.filled { border-color:var(--green-bright); background:#fff; }
    .submit-btn { width:100%; padding:20px; background:var(--green); color:#fff; border:none; border-radius:16px;
        font-weight:700; font-size:20px; cursor:pointer; transition:all 0.2s; margin-bottom:20px; }
    .submit-btn:hover { background:#0f5c38; transform:translateY(-2px); box-shadow:0 10px 25px rgba(21,115,71,0.35); }
    .resend { text-align:center; font-size:14px; color:var(--muted); }
    .resend .timer { color:var(--ink); font-weight:700; }
    .resend .link { color:var(--green-bright); font-weight:700; cursor:pointer; text-decoration:none; }
    @media (max-width:560px){
        body{padding:0;background:#fff;} .mockup-container{border-radius:0;box-shadow:none;}
        .form-card{margin:-55px 18px 0;padding:24px;} .card-title{font-size:18px;} .code-box{font-size:20px;border-radius:11px;}
        .submit-btn{padding:16px;font-size:17px;}
    }
</style>
</head>
<body>
<div class="mockup-container">
    <div class="hero"></div>
    <div class="form-card">
        <button class="back-link">&#8592; Modifier l'adresse e-mail</button>
        <div class="card-title">Vérifiez votre e-mail</div>
        <div class="card-subtitle">Entrez le code à 6 chiffres envoyé à <b>j•••@email.com</b></div>
        <div class="code-inputs">
            <input class="code-box" type="tel" maxlength="1" inputmode="numeric">
            <input class="code-box" type="tel" maxlength="1" inputmode="numeric">
            <input class="code-box" type="tel" maxlength="1" inputmode="numeric">
            <input class="code-box" type="tel" maxlength="1" inputmode="numeric">
            <input class="code-box" type="tel" maxlength="1" inputmode="numeric">
            <input class="code-box" type="tel" maxlength="1" inputmode="numeric">
        </div>
        <button class="submit-btn">Vérifier</button>
        <div class="resend">Vous n'avez rien reçu ? <span class="timer" id="timer">Renvoyer dans 00:30</span></div>
    </div>
</div>
<script>
    const boxes = document.querySelectorAll('.code-box');
    boxes.forEach((box,i)=>{
        box.addEventListener('input',e=>{
            e.target.value=e.target.value.replace(/\D/g,'');
            if(e.target.value){e.target.classList.add('filled'); if(i<boxes.length-1)boxes[i+1].focus();}
            else{e.target.classList.remove('filled');}
        });
        box.addEventListener('keydown',e=>{ if(e.key==='Backspace'&&!e.target.value&&i>0)boxes[i-1].focus(); });
    });
    let t=30; const el=document.getElementById('timer');
    const iv=setInterval(()=>{ t--; if(t<=0){clearInterval(iv); el.innerHTML='<a class="link">Renvoyer le code</a>';}
        else{ el.textContent='Renvoyer dans 00:'+String(t).padStart(2,'0'); } },1000);
</script>
</body>
</html>
