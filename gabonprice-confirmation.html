<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GabonPrice - Prix publié</title>
<style>
    :root {
        --green: #157347; --green-bright: #16A34A; --green-soft: #ECFDF5;
        --blue: #1E3A8A; --gold: #FCD34D; --ink: #111827; --muted: #6B7280;
        --line: #E5E7EB; --bg: #F4F6F5; --card: #FFFFFF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background:#d8d8d8; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding:20px; }
    .phone { width:100%; max-width:430px; background:var(--card); border-radius:34px; overflow:hidden;
        position:relative; box-shadow:0 25px 70px rgba(0,0,0,0.3); min-height:900px;
        display:flex; flex-direction:column; }
    @media (max-width:430px){ body{padding:0;background:white;} .phone{border-radius:0;box-shadow:none;min-height:100vh;} }

    .confirm-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
        padding:40px 28px; text-align:center; }
    .success-ring { width:96px; height:96px; border-radius:50%; background:var(--green-soft);
        display:flex; align-items:center; justify-content:center; margin-bottom:24px;
        animation:pop 0.4s cubic-bezier(.34,1.56,.64,1); }
    .success-ring svg { width:48px; height:48px; color:var(--green-bright); }
    @keyframes pop { 0%{ transform:scale(0); opacity:0; } 100%{ transform:scale(1); opacity:1; } }

    .confirm-title { font-size:22px; font-weight:800; color:var(--ink); margin-bottom:8px; }
    .confirm-sub { font-size:14px; color:var(--muted); line-height:1.5; margin-bottom:24px; max-width:280px; }

    .karma-pill { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(120deg, var(--gold), #F59E0B);
        color:#78350F; font-weight:800; font-size:14px; padding:10px 18px; border-radius:999px; margin-bottom:28px;
        box-shadow:0 6px 18px rgba(245,158,11,0.3); }

    .summary-card { width:100%; background:var(--bg); border:1px solid var(--line); border-radius:16px; padding:14px;
        display:flex; align-items:center; gap:12px; margin-bottom:32px; text-align:left; }
    .summary-emoji { width:44px; height:44px; border-radius:11px; background:var(--card); display:flex; align-items:center;
        justify-content:center; font-size:22px; flex-shrink:0; border:1px solid var(--line); }
    .summary-info { flex:1; min-width:0; }
    .summary-name { font-size:14px; font-weight:700; color:var(--ink); }
    .summary-meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .summary-price { font-size:16px; font-weight:800; color:var(--green); flex-shrink:0; }

    .confirm-actions { width:100%; display:flex; flex-direction:column; gap:10px; }
    .btn-primary { width:100%; padding:16px; background:var(--green); color:white; border:none; border-radius:14px;
        font-weight:700; font-size:16px; cursor:pointer; }
    .btn-secondary { width:100%; padding:16px; background:var(--card); color:var(--ink); border:1.5px solid var(--line);
        border-radius:14px; font-weight:700; font-size:15px; cursor:pointer; }
</style></head><body>
<div class="phone">
    <div class="confirm-body">
        <div class="success-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="confirm-title">Prix publié !</div>
        <div class="confirm-sub">Merci pour votre contribution. Elle est déjà visible par toute la communauté GabonPrice.</div>

        <div class="karma-pill">★ +10 karma</div>

        <div class="summary-card">
            <div class="summary-emoji">🍚</div>
            <div class="summary-info">
                <div class="summary-name">Riz parfumé 5kg</div>
                <div class="summary-meta">Mbolo · Libreville, Glass</div>
            </div>
            <div class="summary-price">4 500<small style="font-size:11px;color:var(--muted)"> F</small></div>
        </div>

        <div class="confirm-actions">
            <button class="btn-primary">Voir le produit</button>
            <button class="btn-secondary">Ajouter un autre prix</button>
        </div>
    </div>
</div>
</body></html>
